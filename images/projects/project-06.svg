<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-labelledby="title">
  <title id="title">terminal-wrapped — Spotify Wrapped for the command line</title>
  <rect width="640" height="400" fill="#05070b"/>
  <path d="M0 50h640M0 100h640M0 150h640M0 200h640M0 250h640M0 300h640M0 350h640M50 0v400M100 0v400M150 0v400M200 0v400M250 0v400M300 0v400M350 0v400M400 0v400M450 0v400M500 0v400M550 0v400M600 0v400" stroke="#f5f5f5" stroke-opacity=".06"/>
  <!-- Terminal window -->
  <rect x="78" y="70" width="484" height="262" fill="#090c11" stroke="#ffb84d" stroke-opacity=".7" stroke-width="3"/>
  <rect x="78" y="70" width="484" height="36" fill="#ffb84d" fill-opacity=".12"/>
  <circle cx="104" cy="88" r="5" fill="#ffb84d"/>
  <circle cx="124" cy="88" r="5" fill="#f5f5f5" fill-opacity=".45"/>
  <circle cx="144" cy="88" r="5" fill="#f5f5f5" fill-opacity=".25"/>
  <text x="232" y="93" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".5">terminal-wrapped · 2024</text>
  <!-- Command prompt line -->
  <text x="106" y="140" fill="#ffb84d" font-family="monospace" font-size="14">$ terminal-wrapped --year 2024</text>
  <!-- Ranked commands with bars -->
  <text x="106" y="170" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".8">1  git</text>
  <rect x="182" y="158" width="128" height="10" fill="#ffb84d" fill-opacity=".82"/>
  <text x="322" y="170" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".6">438x</text>
  <text x="106" y="198" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".7">2  python</text>
  <rect x="198" y="186" width="93" height="10" fill="#ffb84d" fill-opacity=".62"/>
  <text x="304" y="198" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".5">312x</text>
  <text x="106" y="226" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".6">3  npm</text>
  <rect x="174" y="214" width="60" height="10" fill="#ffb84d" fill-opacity=".45"/>
  <text x="248" y="226" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".45">198x</text>
  <text x="106" y="254" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".5">4  docker</text>
  <rect x="196" y="242" width="42" height="10" fill="#ffb84d" fill-opacity=".3"/>
  <text x="252" y="254" fill="#f5f5f5" font-family="monospace" font-size="13" opacity=".4">142x</text>
  <text x="106" y="306" fill="#ffb84d" font-family="monospace" font-size="20" letter-spacing="3">TERMINAL WRAPPED</text>
</svg>
